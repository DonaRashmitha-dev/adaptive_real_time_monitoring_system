name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 core/ generator/ --max-line-length=120 --ignore=E501,W503,E302,E305,E221,E241,E272,E741,W391

      - name: Run Python tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm install

      - name: Lint Node (basic check)
        run: node --check webhook_server/server.js

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build

      - name: Smoke test — webhook starts
        run: |
          docker compose up -d webhook redis
          sleep 10
          curl -f http://localhost:3000/health
          docker compose down
